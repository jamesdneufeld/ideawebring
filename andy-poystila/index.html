<!DOCUTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Andy — IDEA Web Ring</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Jacquard+12&display=swap");
    </style>
  </head>

  <body style="background-color: #000" ;>
    <div id="background">
      <img src="assets/andy-poystila_lily-pad_background.jpg" alt="" />
    </div>

    <div id="sticky-dock">
      <img
        src="assets/andy-poystila_lily-pad_background-sticky-dock.png"
        alt=""
      />
    </div>
    <div>
      <nav
        class="webring"
        data-members="/ideawebring/webring-members-coding-club.json"
        data-hub="/ideawebring/"
      >
        <a href="#" class="webring-previous">⬅ Previous</a>
        <span class="divider">|</span>
        <a href="/ideawebring/" class="webring-hub">IDEA Web Ring</a>
        <span class="divider">|</span>
        <a href="#" class="webring-next">Next ➡</a>
      </nav>
      <!-- Add this where you want the counter to appear -->
      <div class="webring page-counter">
        <img src="assets/eye.png" alt="" /> <span id="viewCount">~</span> views
      </div>
      <script src="../counter.js"></script>
      <script src="../webring.js"></script>
    </div>
    <section class="lilies"></section>
  </body>
