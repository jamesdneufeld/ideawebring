<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Web Ring Admin · students.json Generator</title>
    <style>
      body {
        background: #0d0f12;
        font-family: monospace;
        padding: 2rem;
        color: #e6edf3;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.4rem;
        border-left: 3px solid #3fb950;
        padding-left: 1rem;
        margin-bottom: 1rem;
      }

      textarea {
        width: 100%;
        height: 250px;
        background: #161b22;
        color: #e6edf3;
        border: 1px solid #30363d;
        padding: 1rem;
        border-radius: 6px;
        font-family: monospace;
      }

      button {
        margin-top: 1rem;
        margin-right: 0.5rem;
        padding: 0.5rem 1rem;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #30363d;
      }

      pre {
        margin-top: 1rem;
        background: #0d0f12;
        border: 1px solid #30363d;
        padding: 1rem;
        border-radius: 6px;
        max-height: 400px;
        overflow: auto;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🕸️ students.json Generator</h1>

      <textarea id="input" placeholder="Paste folder names, one per line"></textarea>

      <div>
        <button onclick="generate()">Generate JSON</button>
        <button onclick="download()">Download students.json</button>
      </div>

      <pre id="output">{}</pre>
    </div>

    <script>
      let data = [];

      function toName(folder) {
        return folder
          .split("-")
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }

      function generate() {
        const folders = document
          .getElementById("input")
          .value.split("\n")
          .map((f) => f.trim())
          .filter(Boolean);

        data = folders.map((id) => ({
          id,
          displayName: toName(id),
          resumeRequirementMet: false,
          notes: "",
        }));

        const output = {
          lastUpdated: new Date().toISOString().split("T")[0],
          students: data,
        };

        document.getElementById("output").textContent = JSON.stringify(output, null, 2);
      }

      function download() {
        const output = {
          lastUpdated: new Date().toISOString().split("T")[0],
          students: data,
        };

        const blob = new Blob([JSON.stringify(output, null, 2)], { type: "application/json" });

        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "students.json";
        a.click();
      }
    </script>
  </body>
</html>
