<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IDEA Web Ring · Complete Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0d0f12;
        font-family: "Courier New", "SF Mono", monospace;
        padding: 2rem;
        color: #e6edf3;
      }

      .container {
        max-width: 1600px;
        margin: 0 auto;
      }

      /* Header */
      .dashboard-header {
        margin-bottom: 2rem;
      }

      h1 {
        font-size: 1.5rem;
        border-left: 3px solid #3fb950;
        padding-left: 1rem;
        margin-bottom: 0.5rem;
      }

      .subhead {
        color: #8b949e;
        padding-left: 1rem;
        font-size: 0.8rem;
      }

      /* Stats Bar */
      .stats-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 1.5rem 0;
        padding: 1rem;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
      }

      .stat-card {
        flex: 1;
        min-width: 90px;
        text-align: center;
        padding: 0.75rem;
        background: #0d0f12;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.1s;
      }

      .stat-card:hover {
        background: #1c2128;
        transform: translateY(-1px);
      }

      .stat-number {
        font-size: 1.8rem;
        font-weight: bold;
        color: #3fb950;
      }

      .stat-label {
        font-size: 0.7rem;
        color: #8b949e;
        margin-top: 0.25rem;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin: 1.5rem 0;
        align-items: center;
        justify-content: space-between;
      }

      .search-box {
        flex: 2;
        min-width: 200px;
      }

      .search-box input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        background: #0d0f12;
        border: 1px solid #30363d;
        color: #e6edf3;
        border-radius: 6px;
        font-family: monospace;
      }

      .filter-group {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .filter-btn,
      .sort-btn,
      .action-btn {
        padding: 0.4rem 0.8rem;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 20px;
        cursor: pointer;
        font-family: monospace;
        font-size: 0.7rem;
        transition: all 0.1s;
      }

      .filter-btn.active,
      .sort-btn.active {
        background: #1f6feb;
        border-color: #388bfd;
        color: white;
      }

      .filter-btn:hover,
      .sort-btn:hover,
      .action-btn:hover {
        background: #30363d;
      }

      .action-btn {
        background: #3fb95020;
        border-color: #3fb95040;
        color: #3fb950;
      }

      .action-btn:hover {
        background: #3fb95040;
      }

      /* Cohort and Tag panels */
      .filter-panel {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 1rem;
      }

      .filter-panel h4 {
        font-size: 0.7rem;
        color: #8b949e;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
      }

      .tag-group,
      .cohort-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .tag-filter,
      .cohort-filter {
        padding: 0.2rem 0.6rem;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 16px;
        font-size: 0.65rem;
        cursor: pointer;
      }

      .tag-filter.active,
      .cohort-filter.active {
        background: #1f6feb;
        border-color: #388bfd;
        color: white;
      }

      /* Student Grid */
      .student-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
        max-height: 600px;
        overflow-y: auto;
        padding: 0.25rem;
      }

      /* Student Card */
      .student-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1rem;
        transition: all 0.15s;
      }

      .student-card:hover {
        border-color: #8b949e;
        transform: translateY(-2px);
      }

      .student-card.inactive {
        opacity: 0.6;
        border-color: #21262d;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.75rem;
      }

      .student-name {
        font-size: 1rem;
        font-weight: bold;
        color: #f0f6fc;
      }

      .student-folder {
        font-size: 0.6rem;
        color: #6e7681;
        margin-top: 0.2rem;
      }

      .status-badge {
        font-size: 0.6rem;
        padding: 0.2rem 0.5rem;
        border-radius: 999px;
        border: 1px solid currentColor;
      }

      .status-active {
        color: #3fb950;
        border-color: #3fb950;
      }
      .status-inactive {
        color: #6e7681;
        border-color: #6e7681;
      }
      .status-alumni {
        color: #d29922;
        border-color: #d29922;
      }

      .card-details {
        margin: 0.75rem 0;
        padding: 0.5rem 0;
        border-top: 1px solid #21262d;
        border-bottom: 1px solid #21262d;
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.3rem;
        font-size: 0.7rem;
      }

      .detail-label {
        color: #8b949e;
      }

      .detail-value {
        color: #e6edf3;
      }

      .resume-badge {
        display: inline-block;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-size: 0.6rem;
      }

      .resume-yes {
        background: #3fb95020;
        color: #3fb950;
      }

      .resume-no {
        background: #6e768120;
        color: #6e7681;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-top: 0.5rem;
      }

      .tag {
        font-size: 0.55rem;
        padding: 0.1rem 0.4rem;
        background: #1f6feb20;
        border-radius: 12px;
        color: #58a6ff;
      }

      .card-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 0.75rem;
      }

      .card-link {
        font-size: 0.7rem;
        color: #58a6ff;
        text-decoration: none;
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        background: #1f6feb20;
      }

      .card-link:hover {
        background: #1f6feb40;
      }

      .activity-timeline {
        margin-top: 0.5rem;
        font-size: 0.6rem;
        color: #6e7681;
        display: flex;
        align-items: center;
        gap: 0.3rem;
      }

      .activity-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .activity-dot.active {
        background: #3fb950;
        box-shadow: 0 0 4px #3fb950;
      }
      .activity-dot.recent {
        background: #d29922;
      }
      .activity-dot.dormant {
        background: #6e7681;
      }

      .no-results {
        text-align: center;
        padding: 3rem;
        color: #6e7681;
        grid-column: 1 / -1;
      }

      /* Footer */
      .footer {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid #21262d;
        font-size: 0.7rem;
        color: #6e7681;
        text-align: center;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      /* Loading animation */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .loading {
        animation: pulse 1s infinite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="dashboard-header">
        <h1>🕸️ IDEA Web Ring · Complete Admin Dashboard</h1>
        <div class="subhead">Student overview with filtering, sorting, activity tracking, and CSV export</div>
      </div>

      <!-- Stats will be injected here -->
      <div id="statsBar" class="stats-bar"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 Search by name, folder, or GitHub..." />
        </div>
        <div class="filter-group">
          <button class="sort-btn" data-sort="name">Sort: Name ↕</button>
          <button class="sort-btn" data-sort="status">Sort: Status</button>
          <button class="sort-btn" data-sort="activity">Sort: Activity</button>
        </div>
        <div>
          <button class="action-btn" id="exportCSVBtn">📊 Export CSV</button>
          <button class="action-btn" id="refreshBtn">🔄 Refresh Activity</button>
        </div>
      </div>

      <!-- Cohort Filter Panel -->
      <div class="filter-panel" id="cohortPanel" style="display: none">
        <h4>📅 Filter by Cohort</h4>
        <div class="cohort-group" id="cohortGroup"></div>
      </div>

      <!-- Tags Filter Panel -->
      <div class="filter-panel" id="tagsPanel" style="display: none">
        <h4>🏷️ Filter by Tags</h4>
        <div class="tag-group" id="tagGroup"></div>
      </div>

      <!-- Status Filter Buttons -->
      <div class="filter-group" id="statusFilterGroup">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="inactive">Inactive</button>
        <button class="filter-btn" data-filter="alumni">Alumni</button>
        <button class="filter-btn" data-filter="no-github">Missing GitHub</button>
        <button class="filter-btn" data-filter="resume-ready">Resume Ready</button>
      </div>

      <!-- Student Grid -->
      <div id="studentGrid" class="student-grid">
        <div class="no-results loading">Loading students...</div>
      </div>

      <div class="footer">
        <span>📁 Data source: students.json</span>
        <span>🕸️ IDEA Web Ring Dashboard v2.0</span>
      </div>
    </div>

    <script>
      const REPO_OWNER = "jamesdneufeld";
      const REPO_NAME = "ideawebring";

      let allStudents = [];
      let activityCache = {};
      let currentFilter = "all";
      let currentSearch = "";
      let currentSort = "name";
      let currentSortDirection = "asc";
      let selectedCohorts = new Set();
      let selectedTags = new Set();

      // Available cohorts and tags (auto-discovered from data)
      let availableCohorts = new Set();
      let availableTags = new Set();

      // ----------------------------
      // GITHUB ACTIVITY API (with cache)
      // ----------------------------
      async function getActivity(folder) {
        const cacheKey = `dashboard_activity_${folder}`;
        const cached = localStorage.getItem(cacheKey);

        if (cached) {
          const { data, timestamp } = JSON.parse(cached);
          if (Date.now() - timestamp < 60 * 60 * 1000) {
            return data;
          }
        }

        try {
          const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?path=${folder}&per_page=1`;
          const res = await fetch(url);

          if (res.status === 404) {
            return { status: "dormant", date: null, lastCommit: null };
          }

          const data = await res.json();
          const date = data?.[0]?.commit?.author?.date || null;

          let status = "dormant";
          if (date) {
            const days = (new Date() - new Date(date)) / (1000 * 60 * 60 * 24);
            if (days <= 7) status = "active";
            else if (days <= 30) status = "recent";
            else status = "dormant";
          }

          const result = { status, date, lastCommit: date ? new Date(date).toLocaleDateString() : null };
          localStorage.setItem(cacheKey, JSON.stringify({ data: result, timestamp: Date.now() }));
          return result;
        } catch (err) {
          return { status: "dormant", date: null, lastCommit: null };
        }
      }

      async function loadActivityForAllStudents() {
        const promises = allStudents.map(async (student) => {
          const activity = await getActivity(student.id);
          activityCache[student.id] = activity;
        });
        await Promise.all(promises);
        renderDashboard();
      }

      // ----------------------------
      // LOAD STUDENTS.JSON
      // ----------------------------
      async function loadStudents() {
        try {
          const response = await fetch("../students.json");
          if (!response.ok) throw new Error("students.json not found");
          const data = await response.json();
          allStudents = data.students || [];

          // Auto-discover cohorts and tags
          allStudents.forEach((s) => {
            if (s.cohort) availableCohorts.add(s.cohort);
            if (s.tags && Array.isArray(s.tags)) {
              s.tags.forEach((t) => availableTags.add(t));
            }
          });

          renderCohortPanel();
          renderTagsPanel();
        } catch (err) {
          console.error("Failed to load students.json:", err);
          document.getElementById("studentGrid").innerHTML = '<div class="no-results">❌ Failed to load students.json. Make sure it exists in the repo root.</div>';
        }
      }

      // ----------------------------
      // RENDER COHORT PANEL
      // ----------------------------
      function renderCohortPanel() {
        const cohortPanel = document.getElementById("cohortPanel");
        const cohortGroup = document.getElementById("cohortGroup");

        if (availableCohorts.size === 0) {
          cohortPanel.style.display = "none";
          return;
        }

        cohortPanel.style.display = "block";
        cohortGroup.innerHTML = '<button class="cohort-filter" data-cohort="all">All Cohorts</button>';

        Array.from(availableCohorts)
          .sort()
          .forEach((cohort) => {
            const btn = document.createElement("button");
            btn.className = "cohort-filter";
            btn.textContent = cohort;
            btn.dataset.cohort = cohort;
            btn.onclick = () => toggleCohort(cohort);
            cohortGroup.appendChild(btn);
          });
      }

      function toggleCohort(cohort) {
        if (selectedCohorts.has(cohort)) {
          selectedCohorts.delete(cohort);
        } else {
          selectedCohorts.add(cohort);
        }
        highlightCohortFilters();
        renderDashboard();
      }

      function highlightCohortFilters() {
        document.querySelectorAll(".cohort-filter").forEach((btn) => {
          const cohort = btn.dataset.cohort;
          if (cohort === "all") {
            btn.classList.toggle("active", selectedCohorts.size === 0);
          } else {
            btn.classList.toggle("active", selectedCohorts.has(cohort));
          }
        });
      }

      // ----------------------------
      // RENDER TAGS PANEL
      // ----------------------------
      function renderTagsPanel() {
        const tagsPanel = document.getElementById("tagsPanel");
        const tagGroup = document.getElementById("tagGroup");

        if (availableTags.size === 0) {
          tagsPanel.style.display = "none";
          return;
        }

        tagsPanel.style.display = "block";
        tagGroup.innerHTML = '<button class="tag-filter" data-tag="all">All Tags</button>';

        Array.from(availableTags)
          .sort()
          .forEach((tag) => {
            const btn = document.createElement("button");
            btn.className = "tag-filter";
            btn.textContent = tag;
            btn.dataset.tag = tag;
            btn.onclick = () => toggleTag(tag);
            tagGroup.appendChild(btn);
          });
      }

      function toggleTag(tag) {
        if (selectedTags.has(tag)) {
          selectedTags.delete(tag);
        } else {
          selectedTags.add(tag);
        }
        highlightTagFilters();
        renderDashboard();
      }

      function highlightTagFilters() {
        document.querySelectorAll(".tag-filter").forEach((btn) => {
          const tag = btn.dataset.tag;
          if (tag === "all") {
            btn.classList.toggle("active", selectedTags.size === 0);
          } else {
            btn.classList.toggle("active", selectedTags.has(tag));
          }
        });
      }

      // ----------------------------
      // STATISTICS
      // ----------------------------
      function computeStats() {
        const total = allStudents.length;
        const active = allStudents.filter((s) => s.status === "active").length;
        const inactive = allStudents.filter((s) => s.status === "inactive").length;
        const alumni = allStudents.filter((s) => s.status === "alumni").length;
        const resumeReady = allStudents.filter((s) => s.resumeRequirementMet).length;
        const missingGithub = allStudents.filter((s) => !s.githubUsername || s.githubUsername === "").length;
        const withActivity = Object.values(activityCache).filter((a) => a?.status === "active").length;

        return { total, active, inactive, alumni, resumeReady, missingGithub, withActivity };
      }

      // ----------------------------
      // RENDER STATS BAR
      // ----------------------------
      function renderStats() {
        const stats = computeStats();
        const statsBar = document.getElementById("statsBar");
        statsBar.innerHTML = `
      <div class="stat-card" onclick="setFilter('all')"><div class="stat-number">${stats.total}</div><div class="stat-label">Total Students</div></div>
      <div class="stat-card" onclick="setFilter('active')"><div class="stat-number" style="color: #3fb950;">${stats.active}</div><div class="stat-label">Status: Active</div></div>
      <div class="stat-card" onclick="setFilter('inactive')"><div class="stat-number" style="color: #6e7681;">${stats.inactive}</div><div class="stat-label">Status: Inactive</div></div>
      <div class="stat-card" onclick="setFilter('alumni')"><div class="stat-number" style="color: #d29922;">${stats.alumni}</div><div class="stat-label">Alumni</div></div>
      <div class="stat-card" onclick="setFilter('resume-ready')"><div class="stat-number" style="color: #58a6ff;">${stats.resumeReady}</div><div class="stat-label">Resume Ready</div></div>
      <div class="stat-card" onclick="setFilter('no-github')"><div class="stat-number" style="color: #f85149;">${stats.missingGithub}</div><div class="stat-label">Missing GitHub</div></div>
      <div class="stat-card"><div class="stat-number" style="color: #3fb950;">${stats.withActivity}</div><div class="stat-label">Active (GitHub)</div></div>
    `;
      }

      function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll("#statusFilterGroup .filter-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.filter === filter);
        });
        renderDashboard();
      }

      // ----------------------------
      // FILTERING
      // ----------------------------
      function getFilteredStudents() {
        let filtered = [...allStudents];

        // Status filter
        if (currentFilter === "active") {
          filtered = filtered.filter((s) => s.status === "active");
        } else if (currentFilter === "inactive") {
          filtered = filtered.filter((s) => s.status === "inactive");
        } else if (currentFilter === "alumni") {
          filtered = filtered.filter((s) => s.status === "alumni");
        } else if (currentFilter === "no-github") {
          filtered = filtered.filter((s) => !s.githubUsername || s.githubUsername === "");
        } else if (currentFilter === "resume-ready") {
          filtered = filtered.filter((s) => s.resumeRequirementMet === true);
        }

        // Cohort filter
        if (selectedCohorts.size > 0) {
          filtered = filtered.filter((s) => s.cohort && selectedCohorts.has(s.cohort));
        }

        // Tags filter
        if (selectedTags.size > 0) {
          filtered = filtered.filter((s) => s.tags && Array.isArray(s.tags) && selectedTags.size === s.tags.filter((t) => selectedTags.has(t)).length);
        }

        // Search
        if (currentSearch) {
          const searchLower = currentSearch.toLowerCase();
          filtered = filtered.filter((s) => s.displayName.toLowerCase().includes(searchLower) || s.id.toLowerCase().includes(searchLower) || (s.githubUsername && s.githubUsername.toLowerCase().includes(searchLower)));
        }

        // Sorting
        filtered.sort((a, b) => {
          let comparison = 0;
          if (currentSort === "name") {
            comparison = a.displayName.localeCompare(b.displayName);
          } else if (currentSort === "status") {
            const statusOrder = { active: 0, recent: 1, dormant: 2 };
            const aStatus = activityCache[a.id]?.status || "dormant";
            const bStatus = activityCache[b.id]?.status || "dormant";
            comparison = (statusOrder[aStatus] || 2) - (statusOrder[bStatus] || 2);
          } else if (currentSort === "activity") {
            const aDate = activityCache[a.id]?.date || 0;
            const bDate = activityCache[b.id]?.date || 0;
            comparison = new Date(bDate) - new Date(aDate);
          }
          return currentSortDirection === "asc" ? comparison : -comparison;
        });

        return filtered;
      }

      // ----------------------------
      // RENDER STUDENT CARD
      // ----------------------------
      function renderStudentCard(student) {
        const portfolioUrl = `https://jamesdneufeld.github.io/ideawebring/${student.id}/`;
        const githubUrl = student.githubUsername ? `https://github.com/${student.githubUsername}` : null;
        const activity = activityCache[student.id] || { status: "dormant", lastCommit: null };

        const card = document.createElement("div");
        card.className = `student-card ${student.status === "inactive" ? "inactive" : ""}`;

        card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="student-name">${escapeHtml(student.displayName)}</div>
          <div class="student-folder">📁 ${student.id}</div>
        </div>
        <span class="status-badge status-${student.status}">${student.status}</span>
      </div>
      <div class="activity-timeline">
        <span class="activity-dot ${activity.status}"></span>
        <span>${activity.status === "active" ? "Active" : activity.status === "recent" ? "Recent activity" : "Dormant"}</span>
        ${activity.lastCommit ? `<span>· last commit ${activity.lastCommit}</span>` : ""}
      </div>
      <div class="card-details">
        <div class="detail-row">
          <span class="detail-label">GitHub:</span>
          <span class="detail-value">${student.githubUsername ? "@" + escapeHtml(student.githubUsername) : "❌ Not linked"}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Resume:</span>
          <span class="detail-value">
            <span class="resume-badge ${student.resumeRequirementMet ? "resume-yes" : "resume-no"}">
              ${student.resumeRequirementMet ? "✓ Requirement Met" : "○ Not Started"}
            </span>
          </span>
        </div>
        ${student.cohort ? `<div class="detail-row"><span class="detail-label">Cohort:</span><span class="detail-value">${escapeHtml(student.cohort)}</span></div>` : ""}
        ${student.notes ? `<div class="detail-row"><span class="detail-label">Notes:</span><span class="detail-value">${escapeHtml(student.notes)}</span></div>` : ""}
      </div>
      ${
        student.tags && student.tags.length
          ? `
        <div class="tags">
          ${student.tags.map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("")}
        </div>
      `
          : ""
      }
      <div class="card-actions">
        <a href="${portfolioUrl}" target="_blank" class="card-link">🌐 Portfolio</a>
        ${githubUrl ? `<a href="${githubUrl}" target="_blank" class="card-link">🐙 GitHub</a>` : ""}
      </div>
    `;

        return card;
      }

      // ----------------------------
      // ESCAPE HTML
      // ----------------------------
      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // ----------------------------
      // RENDER GRID
      // ----------------------------
      function renderGrid() {
        const filtered = getFilteredStudents();
        const grid = document.getElementById("studentGrid");

        if (filtered.length === 0) {
          grid.innerHTML = '<div class="no-results">🔍 No students match your filters</div>';
          return;
        }

        grid.innerHTML = "";
        filtered.forEach((student) => {
          grid.appendChild(renderStudentCard(student));
        });
      }

      // ----------------------------
      // FULL RENDER
      // ----------------------------
      function renderDashboard() {
        renderStats();
        renderGrid();
      }

      // ----------------------------
      // CSV EXPORT
      // ----------------------------
      function exportToCSV() {
        const headers = ["ID", "Display Name", "GitHub Username", "Status", "Resume Requirement Met", "Cohort", "Tags", "Notes", "Last Activity"];
        const rows = allStudents.map((s) => [s.id, s.displayName, s.githubUsername || "", s.status, s.resumeRequirementMet ? "Yes" : "No", s.cohort || "", (s.tags || []).join("; "), s.notes || "", activityCache[s.id]?.lastCommit || ""]);

        const csvContent = [headers, ...rows].map((row) => row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
        const blob = new Blob([csvContent], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `webring_students_${new Date().toISOString().split("T")[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      }

      // ----------------------------
      // EVENT LISTENERS
      // ----------------------------
      function setupEventListeners() {
        // Search
        document.getElementById("searchInput").addEventListener("input", (e) => {
          currentSearch = e.target.value;
          renderDashboard();
        });

        // Status filter buttons
        document.querySelectorAll("#statusFilterGroup .filter-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            currentFilter = btn.dataset.filter;
            document.querySelectorAll("#statusFilterGroup .filter-btn").forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            renderDashboard();
          });
        });

        // Sort buttons
        document.querySelectorAll(".sort-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            const sort = btn.dataset.sort;
            if (currentSort === sort) {
              currentSortDirection = currentSortDirection === "asc" ? "desc" : "asc";
            } else {
              currentSort = sort;
              currentSortDirection = "asc";
            }
            renderDashboard();
          });
        });

        // Export CSV
        document.getElementById("exportCSVBtn").addEventListener("click", exportToCSV);

        // Refresh activity
        document.getElementById("refreshBtn").addEventListener("click", async () => {
          document.getElementById("refreshBtn").textContent = "⟳ Loading...";
          await loadActivityForAllStudents();
          document.getElementById("refreshBtn").textContent = "🔄 Refresh Activity";
        });
      }

      // ----------------------------
      // INITIALIZE
      // ----------------------------
      async function init() {
        await loadStudents();
        setupEventListeners();
        await loadActivityForAllStudents();
      }

      init();
    </script>
  </body>
</html>
