<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>IDEA Web Ring · Student Directory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0d0f12;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Arial, sans-serif;
        padding: 2rem;
        color: #e6edf3;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      .site-header {
        text-align: center;
        margin-bottom: 3rem;
      }

      h1 {
        font-size: 3rem;
        font-weight: 600;
        background: linear-gradient(135deg, #3fb950, #58a6ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
      }

      .tagline {
        color: #8b949e;
        font-size: 1.1rem;
      }

      .stats-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 2rem;
      }

      .stat-pill {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 999px;
        padding: 0.5rem 1.25rem;
        font-size: 0.85rem;
      }

      .stat-number {
        font-weight: bold;
        color: #3fb950;
      }

      .search-section {
        margin-bottom: 2rem;
      }

      .search-box {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
      }

      .search-box input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: #0d0f12;
        border: 1px solid #30363d;
        color: #e6edf3;
        border-radius: 999px;
        font-family: inherit;
        font-size: 1rem;
        text-align: center;
      }

      .filter-section {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin-bottom: 2rem;
      }

      .filter-pill {
        padding: 0.4rem 1rem;
        background: #21262d;
        border: 1px solid #30363d;
        color: #c9d1d9;
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.8rem;
      }

      .filter-pill.active {
        background: #1f6feb;
        border-color: #388bfd;
        color: white;
      }

      .student-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
      }

      .site-card {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        display: block;
        transition: all 0.2s ease;
      }

      .site-card:hover {
        transform: translateY(-4px);
        border-color: #3fb950;
      }

      .site-preview {
        background: #0d0f12;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid #30363d;
        font-size: 3rem;
      }

      .site-info {
        padding: 1rem;
      }

      .site-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: #f0f6fc;
        margin-bottom: 0.25rem;
      }

      .site-url {
        font-size: 0.7rem;
        color: #6e7681;
        margin-bottom: 0.5rem;
      }

      .site-meta {
        display: flex;
        gap: 0.75rem;
        font-size: 0.7rem;
        color: #8b949e;
        flex-wrap: wrap;
      }

      .badge.active {
        color: #3fb950;
      }
      .badge.recent {
        color: #d29922;
      }
      .badge.occasional {
        color: #58a6ff;
      }
      .badge.inactive {
        color: #6e7681;
      }

      .no-results {
        text-align: center;
        padding: 3rem;
        color: #6e7681;
        grid-column: 1 / -1;
      }

      .footer {
        margin-top: 3rem;
        padding-top: 1.5rem;
        border-top: 1px solid #21262d;
        text-align: center;
        font-size: 0.8rem;
        color: #6e7681;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="site-header">
        <h1>🕸️ IDEA Web Ring</h1>
        <div class="tagline">Student websites — built with HTML, CSS, and curiosity</div>
      </div>

      <div id="statsBar" class="stats-bar">Loading...</div>

      <div class="search-section">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 Search by name..." />
        </div>
      </div>

      <div class="filter-section">
        <button class="filter-pill active" data-filter="all">All</button>
        <button class="filter-pill" data-filter="active">Active (&lt;30d)</button>
        <button class="filter-pill" data-filter="recent">Recent (30-60d)</button>
        <button class="filter-pill" data-filter="occasional">Occasional (60-90d)</button>
        <button class="filter-pill" data-filter="alumni">Alumni</button>
      </div>

      <div id="studentGrid" class="student-grid">Loading students...</div>

      <div class="footer">🕸️ IDEA Web Ring — <a href="summer-coding-mentorship.html" style="color: #58a6ff">Join the mentorship</a></div>
    </div>

    <script>
      let allStudents = [];
      let currentFilter = "all";
      let currentSearch = "";

      async function loadStudents() {
        try {
          const res = await fetch("../students.json");
          const data = await res.json();
          allStudents = (data.students || []).filter((s) => !s.withdrawn);

          await loadActivityData();
          renderStats();
          renderGrid();
        } catch (err) {
          document.getElementById("studentGrid").innerHTML = `<div class="no-results">❌ Error loading data</div>`;
        }
      }

      async function loadActivityData() {
        const REPO_OWNER = "jamesdneufeld";
        const REPO_NAME = "ideawebring";

        // Process in batches of 5 to avoid rate limits
        for (let i = 0; i < allStudents.length; i += 5) {
          const batch = allStudents.slice(i, i + 5);
          await Promise.all(
            batch.map(async (student) => {
              try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/commits?path=${student.id}&per_page=1`;
                const res = await fetch(url);

                if (res.ok) {
                  const data = await res.json();
                  const date = data?.[0]?.commit?.author?.date;
                  if (date) {
                    const days = (new Date() - new Date(date)) / (1000 * 60 * 60 * 24);
                    student.activityDays = Math.floor(days);
                    if (days < 30) student.activityStatus = "active";
                    else if (days < 60) student.activityStatus = "recent";
                    else if (days < 90) student.activityStatus = "occasional";
                    else student.activityStatus = "inactive";
                  } else {
                    student.activityStatus = "inactive";
                  }
                } else {
                  student.activityStatus = "inactive";
                }
              } catch {
                student.activityStatus = "inactive";
              }
            }),
          );

          // Delay between batches
          if (i + 5 < allStudents.length) await new Promise((r) => setTimeout(r, 300));
        }
      }

      function renderStats() {
        const stats = {
          total: allStudents.length,
          active: allStudents.filter((s) => s.activityStatus === "active").length,
          recent: allStudents.filter((s) => s.activityStatus === "recent").length,
          occasional: allStudents.filter((s) => s.activityStatus === "occasional").length,
          alumni: allStudents.filter((s) => s.isAlumni).length,
        };

        document.getElementById("statsBar").innerHTML = `
      <div class="stat-pill">📚 <span class="stat-number">${stats.total}</span> sites</div>
      <div class="stat-pill">🟢 <span class="stat-number">${stats.active}</span> active</div>
      <div class="stat-pill">🟡 <span class="stat-number">${stats.recent}</span> recent</div>
      <div class="stat-pill">🔵 <span class="stat-number">${stats.occasional}</span> occasional</div>
      <div class="stat-pill">🎓 <span class="stat-number">${stats.alumni}</span> alumni</div>
    `;
      }

      function renderGrid() {
        let filtered = [...allStudents];

        if (currentFilter === "active") filtered = filtered.filter((s) => s.activityStatus === "active");
        else if (currentFilter === "recent") filtered = filtered.filter((s) => s.activityStatus === "recent");
        else if (currentFilter === "occasional") filtered = filtered.filter((s) => s.activityStatus === "occasional");
        else if (currentFilter === "alumni") filtered = filtered.filter((s) => s.isAlumni);

        if (currentSearch) {
          const q = currentSearch.toLowerCase();
          filtered = filtered.filter((s) => s.displayName?.toLowerCase().includes(q) || s.id?.toLowerCase().includes(q));
        }

        const grid = document.getElementById("studentGrid");
        if (filtered.length === 0) {
          grid.innerHTML = '<div class="no-results">✨ No matching sites</div>';
          return;
        }

        grid.innerHTML = filtered
          .map((s) => {
            let icon = "⚫",
              label = "Inactive";
            if (s.activityStatus === "active") {
              icon = "🟢";
              label = `Active (${s.activityDays}d ago)`;
            } else if (s.activityStatus === "recent") {
              icon = "🟡";
              label = `Recent (${s.activityDays}d ago)`;
            } else if (s.activityStatus === "occasional") {
              icon = "🔵";
              label = `Occasional (${s.activityDays}d ago)`;
            }

            return `
        <a href="https://jamesdneufeld.github.io/ideawebring/${s.id}/" target="_blank" class="site-card">
          <div class="site-preview">🕸️</div>
          <div class="site-info">
            <div class="site-name">${escapeHtml(s.displayName || s.id)}</div>
            <div class="site-url">${s.id}/</div>
            <div class="site-meta">
              <span class="badge ${s.activityStatus}">${icon} ${label}</span>
              ${s.isAlumni ? "<span>🎓</span>" : ""}
            </div>
          </div>
        </a>
      `;
          })
          .join("");
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m] || m);
      }

      document.getElementById("searchInput").addEventListener("input", (e) => {
        currentSearch = e.target.value;
        renderGrid();
      });

      document.querySelectorAll(".filter-pill").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".filter-pill").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderGrid();
        });
      });

      loadStudents();
    </script>
  </body>
</html>
